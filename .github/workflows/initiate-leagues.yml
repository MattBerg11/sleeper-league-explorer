name: Initiate Leagues

on:
  workflow_dispatch:
    inputs:
      league_ids:
        description: 'Comma-separated league IDs to initiate (defaults to vars.LEAGUE_IDS)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: initiate-leagues
  cancel-in-progress: false

jobs:
  sync:
    name: Initiate New Leagues
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run initiate sync
        run: pnpm --filter @sleeper-explorer/etl sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LEAGUE_IDS: ${{ inputs.league_ids || vars.LEAGUE_IDS }}
          SYNC_MODE: initiate